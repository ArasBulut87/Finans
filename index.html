<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Formu</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { margin-top: 0; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; }
        .input-group input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .remember-me { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; color: #555; cursor: pointer; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .status { margin-top: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Giriş Yap</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="email">E-posta Adresiniz</label>
            <input type="email" id="email" required placeholder="example@mail.com">
        </div>
        
        <label class="remember-me">
            <input type="checkbox" id="rememberMe"> Beni bu cihazda hatırla
        </label>
        
        <button type="submit" id="submitBtn">Gönder</button>
    </form>
    <div id="statusMessage" class="status"></div>
</div>

<script>
    // Google Apps Script URL'nizi buraya tam olarak entegre ettim:
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzSG0sd5vEpkoY0RUO16-LwtRlOMiwEOOP7qcfflHudoqcIPwzzNPp3P5JZpKp9M6NP/exec";

    const emailInput = document.getElementById('email');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const loginForm = document.getElementById('loginForm');
    const statusMessage = document.getElementById('statusMessage');

    // 1. SAYFA AÇILDIĞINDA: Cihazda kayıtlı mail var mı kontrol et
    window.addEventListener('DOMContentLoaded', () => {
        const savedEmail = localStorage.getItem('rememberedEmail');
        if (savedEmail) {
            emailInput.value = savedEmail;
            rememberMeCheckbox.checked = true; // Kutucuğu işaretli getir
        }
    });

    // 2. FORMA TIKLANDIĞINDA: Veriyi Google Sheets'e gönder ve beni hatırla durumunu işle
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value;
        const rememberMe = rememberMeCheckbox.checked;

        statusMessage.style.color = "blue";
        statusMessage.innerText = "Gönderiliyor...";

        // "Beni Hatırla" seçildiyse tarayıcıya kaydet, seçilmediyse eskisini sil
        if (rememberMe) {
            localStorage.setItem('rememberedEmail', email);
        } else {
            localStorage.removeItem('rememberedEmail');
        }

        // Google Sheets'e gönderilecek veri paketi
        const payload = {
            action: "save",
            payload: {
                email: email,
                date: new Date().toISOString()
            }
        };

        try {
            // Google Script API Çağrısı
            const response = await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors', // CORS hatasını engellemek için tarayıcı modu
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            // 'no-cors' modunda yanıt içeriği okunamaz ama veri karşıya ulaşır
            statusMessage.style.color = "green";
            statusMessage.innerText = "Başarıyla gönderildi ve kaydedildi!";
            
        } catch (error) {
            console.error("Hata:", error);
            statusMessage.style.color = "red";
            statusMessage.innerText = "Hata oluştu: Failed to fetch";
        }
    });
</script>

</body>
</html>
